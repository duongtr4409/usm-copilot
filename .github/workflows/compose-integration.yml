name: Compose Integration CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build & Unit tests
        run: mvn -f backend/pom.xml -DskipTests=false test

  integration:
    name: Compose-backed Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Start compose services
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.override.yml up -d db redis
      - name: Run integration tests via wrapper
        run: |
          chmod +x scripts/run-integration-tests-compose.sh
          ./scripts/run-integration-tests-compose.sh AddStudentToClassIntegrationTest
